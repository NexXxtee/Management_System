<form method="post">
    {% csrf_token %}
    <label>Имя пользователя:</label>
    <input type="text" name="username" required>
    
    <label>Пароль:</label>
    <input type="password" name="password" required>
    
    <button type="submit">Войти</button>
</form>

{% for message in messages %}
<p style="color: red;">{{ message }}</p>
{% endfor %}
